project:
  name: "steganography_patch_scoring"
  root_dir: ".."
  random_seed: 42

dataset:
  # Change this path when running on another machine.
  root_dir: "data"

  splits:
    train: "train_resized"
    validation: "validation_resized"
    test: "test_resized"

  image_size:
    width: 256
    height: 256

  channels: 3
  color_mode: "rgb"
  recursive: true

  allowed_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"

sliding_window:
  width: 64
  height: 64

  stride:
    x: 8
    y: 8

  expected_grid:
    width: 25
    height: 25

features:
  normalization:
    method: "robust_minmax"
    percentile_low: 1.0
    percentile_high: 99.0
    epsilon: 0.00000001

  score_fusion:
    method: "grouped_weighted_mean"
    clip_min: 0.0
    clip_max: 1.0

    groups:
      intensity_complexity:
        weight: 1.0
        members:
          entropy: 0.5
          variance: 0.5

      spatial_complexity:
        weight: 1.0
        members:
          edge_density: 0.5
          laplacian_variance: 0.5

      pattern_complexity:
        weight: 1.0
        members:
          lbp_non_uniform_ratio: 1.0

  items:
    entropy:
      enabled: true
      weight: 1.0
      direction: "higher"

    variance:
      enabled: true
      weight: 1.0
      direction: "higher"

    edge_density:
      enabled: true
      weight: 1.0
      direction: "higher"

    lbp_non_uniform_ratio:
      enabled: true
      weight: 1.0
      direction: "higher"

    lbp_entropy:
      enabled: false
      weight: 1.0
      direction: "higher"

    laplacian_variance:
      enabled: true
      weight: 1.0
      direction: "higher"

    mse:
      enabled: false
      weight: 1.0
      direction: "lower"

    psnr:
      enabled: false
      weight: 1.0
      direction: "higher"

    ssim:
      enabled: false
      weight: 1.0
      direction: "higher"

    ms_ssim:
      enabled: false
      weight: 1.0
      direction: "higher"


feature_extraction:
  grayscale:
    method: "bt601"

  canny:
    low_threshold: 100
    high_threshold: 200
    aperture_size: 3
    l2_gradient: true

  lbp:
    points: 8
    radius: 1
    method: "uniform"
    normalize_entropy: true
    exclude_border: true

  laplacian:
    kernel_size: 3

  stego_simulation:
    method: "lsb_replacement"
    payload_rate: 0.40
    max_psnr: 100.0

  ms_ssim:
    scales: 3
    weights:
      - 0.10
      - 0.30
      - 0.60
    gaussian_window_size: 11
    gaussian_sigma: 1.5


feature_review:
  split: "train"
  sample_images: 100
  patches_per_image: 10

  # Review all features, including disabled diagnostic features.
  include_disabled_features: true

  high_correlation_threshold: 0.85
  overwrite: true

labels:
  root_dir: "data/labels"
  file_format: "npz"
  dtype: "float32"

  include_feature_maps: true
  include_window_coordinates: true
  include_metadata: true

  filename_suffix: "_labels.npz"

model:
  architecture: "full_image_cnn_v1"
  input_channels: 3
  output_activation: "sigmoid"
  output_layout: "channels_last"

training:
  batch_size: 16
  epochs: 50
  learning_rate: 0.001
  loss: "huber"

  early_stopping:
    enabled: true
    monitor: "val_loss"
    patience: 8
    restore_best_weights: true

  checkpoint:
    enabled: true
    monitor: "val_loss"
    save_best_only: true

threshold_selection:
  start: 0.50
  end: 0.66
  step: 0.01

  reference_threshold: 0.50
  selection_metric: "f1"

  constraints:
    minimum_secure_precision: 0.0
    minimum_secure_recall: 0.0

outputs:
  root_dir: "outputs"

  directories:
    feature_statistics: "feature_statistics"
    models: "models"
    training_reports: "training_reports"
    validation_reports: "validation_reports"
    test_reports: "test_reports"
    heatmaps: "heatmaps"

runtime:
  num_workers: 4
  overwrite_existing: false
  fail_fast: true
  deterministic: true


dataset_validation:
  report_dir: "outputs/dataset_reports"

  expected_counts:
    train: 250
    validation: 75
    test: 50

  checks:
    dimensions: true
    color_mode: true
    channels: true
    full_decode: true

  duplicates:
    check_filenames: true
    check_image_ids: true
    check_content: true

    # Available values:
    # file   -> hash encoded file bytes
    # pixels -> hash decoded canonical image pixels
    content_hash: "pixels"

    within_split_severity: "warning"
    cross_split_severity: "error"

  unsupported_files:
    # Available values: ignore, warning, error
    severity: "ignore"

  reports:
    save_manifest: true
    save_issues: true
    save_summary: true
    overwrite: true

  execution:
    # null uses runtime.num_workers from the main configuration.
    max_workers: null
    progress_interval: 500

  fail_on_error: true



label_generation:
  output_root: "data/labels"

  normalization:
    fit_split: "train"
    fit_mode: "exact"

    artifact_path: "outputs/label_generation/feature_normalization.json"
    feature_matrix_path: "outputs/label_generation/train_feature_matrix.float32.dat"
    raw_cache_dir: "outputs/label_generation/raw_train_features"

    cache_training_features: true
    reuse_existing_artifact: true
    delete_feature_matrix_after_fit: true
    delete_raw_cache_after_success: false

  storage:
    compressed: true

    save_raw_feature_maps: true
    save_normalized_feature_maps: true
    save_group_score_maps: true
    save_window_coordinates: true
    save_metadata: true

  execution:
    max_workers: 4
    progress_interval: 50
    resume: true
    overwrite_existing: false

  integrity:
    verify_after_write: true
    fail_on_non_finite: true
    score_tolerance: 0.000001

  reports:
    manifest_filename: "manifest.csv"
    summary_filename: "summary.json"
    global_summary_path: "outputs/label_generation/label_generation_summary.json"

